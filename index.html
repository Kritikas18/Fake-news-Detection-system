<!DOCTYPE html>
<html>
<head>
    <title>Fake News Detector</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>📰 AI Fake News Detector</h1>

<form action="/predict" method="POST">

<textarea
name="news"
placeholder="Paste news content here..."
required></textarea>

<button type="submit">
Analyze News
</button>

</form>

{% if prediction %}

<div class="result">

<h2 class="{% if 'REAL' in prediction %}real{% else %}fake{% endif %}">
{{ prediction }}
</h2>

<h3>Confidence: {{ confidence }}%</h3>

</div>

{% endif %}

</div>
<div class="footer">
Built with Python • Flask • Machine Learning • AI
</div>

</body>
</html>
